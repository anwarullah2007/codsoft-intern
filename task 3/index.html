<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cit officials - Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="./WhatsApp Image 2026-03-16 at 8.09.20 PM.jpeg" alt="CIT Officials Logo" class="logo">
        <h1>cit officials</h1>
    </header>
    
    <main>
        <div class="calculator">
            <div class="display">
                <input type="text" id="calc-display" disabled placeholder="0" />
            </div>
            
            <div class="mode-toggle">
                <button id="toggle-sci">Scientific Mode</button>
            </div>
            
            <div class="buttons grid-basic" id="buttons-container">
                <!-- Scientific Buttons (Hidden by default) -->
                <button class="btn sci hidden" data-action="sin">sin</button>
                <button class="btn sci hidden" data-action="cos">cos</button>
                <button class="btn sci hidden" data-action="tan">tan</button>
                <button class="btn sci hidden" data-action="log">log</button>
                <button class="btn sci hidden" data-action="sqrt">√</button>
                <button class="btn sci hidden" data-action="pow">x^y</button>
                <button class="btn sci hidden" data-action="pi">π</button>
                <button class="btn sci hidden" data-action="e">e</button>
                <button class="btn sci hidden" data-action="(">(</button>
                <button class="btn sci hidden" data-action=")">)</button>

                <!-- Basic Buttons -->
                <button class="btn action" data-action="clear">C</button>
                <button class="btn action" data-action="delete">DEL</button>
                <button class="btn operator" data-action="%">%</button>
                <button class="btn operator" data-action="/">÷</button>

                <button class="btn number">7</button>
                <button class="btn number">8</button>
                <button class="btn number">9</button>
                <button class="btn operator" data-action="*">×</button>

                <button class="btn number">4</button>
                <button class="btn number">5</button>
                <button class="btn number">6</button>
                <button class="btn operator" data-action="-">−</button>

                <button class="btn number">1</button>
                <button class="btn number">2</button>
                <button class="btn number">3</button>
                <button class="btn operator" data-action="+">+</button>

                <button class="btn number span-2">0</button>
                <button class="btn number">.</button>
                <button class="btn operator" data-action="=">=</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 cit officials. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
